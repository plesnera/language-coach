steps:
  # Install Python dependencies once into /workspace/.venv.
  - name: "python:3.12-slim"
    id: install-python-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        python -m pip install --no-cache-dir uv==0.8.13
        uv sync --locked

  # Run backend unit tests.
  - name: "python:3.12-slim"
    id: backend-unit-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        .venv/bin/pytest tests/unit

  # Run backend integration tests with LOCAL_DEV=true to avoid external model dependencies.
  - name: "python:3.12-slim"
    id: backend-integration-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        LOCAL_DEV=true .venv/bin/pytest tests/integration

  # Validate frontend build for split-stack changes.
  - name: "node:20"
    id: frontend-build
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        npm --prefix frontend ci
        npm --prefix frontend run build

logsBucket: gs://${PROJECT_ID}-language-coach-logs/build-logs
options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
