steps:
  - name: "python:3.12-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv==0.8.13 --user && uv sync --locked
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  - name: "python:3.12-slim"
    id: deploy-agent-staging
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        uv export --no-hashes --no-sources --no-header --no-dev --no-emit-project --no-annotate --locked > app/app_utils/.requirements.txt
        uv run python -m app.app_utils.deploy \
          --project ${_STAGING_PROJECT_ID} \
          --location ${_REGION} \
          --display-name ${_DEPLOY_DISPLAY_NAME} \
          --source-packages=./app \
          --entrypoint-module=app.agent_engine_app \
          --entrypoint-object=agent_engine \
          --requirements-file=app/app_utils/.requirements.txt \
          --service-account=${_APP_SERVICE_ACCOUNT_STAGING} \
          --set-env-vars="COMMIT_SHA=${COMMIT_SHA},LOGS_BUCKET_NAME=${_LOGS_BUCKET_NAME_STAGING}"
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-api-staging
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        REMOTE_AGENT_ENGINE_ID=$(python3 -c "import json; from pathlib import Path; p=Path('deployment_metadata.json'); data=json.loads(p.read_text(encoding='utf-8')) if p.exists() else {}; print(data.get('remote_agent_engine_id', ''))")
        if [ -z "$${REMOTE_AGENT_ENGINE_ID}" ]; then
          echo "Could not determine remote_agent_engine_id from deployment_metadata.json"
          exit 1
        fi

        gcloud run deploy "${_API_SERVICE_NAME}" \
          --project "${_STAGING_PROJECT_ID}" \
          --region "${_REGION}" \
          --source "." \
          --allow-unauthenticated \
          --port "8000" \
          --service-account "${_APP_SERVICE_ACCOUNT_STAGING}" \
          --set-env-vars "GOOGLE_CLOUD_PROJECT=${_STAGING_PROJECT_ID},GOOGLE_CLOUD_PROJECT_ID=${_STAGING_PROJECT_ID},GOOGLE_CLOUD_REGION=${_REGION},LOGS_BUCKET_NAME=${_LOGS_BUCKET_NAME_STAGING}" \
          --command "python" \
          --args "-m" \
          --args "app.app_utils.expose_app" \
          --args "--mode" \
          --args "remote" \
          --args "--remote-id" \
          --args "$${REMOTE_AGENT_ENGINE_ID}" \
          --args "--project-id" \
          --args "${_STAGING_PROJECT_ID}" \
          --args "--location" \
          --args "${_REGION}" \
          --args "--host" \
          --args "0.0.0.0" \
          --args "--port" \
          --args "8000"

        API_URL=$(gcloud run services describe "${_API_SERVICE_NAME}" --project "${_STAGING_PROJECT_ID}" --region "${_REGION}" --format="value(status.url)")
        printf '%s' "$${API_URL}" > /workspace/api_url.txt

  # Load Testing
  - name: "python:3.12-slim"
    id: load_test
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        API_URL=$$(cat /workspace/api_url.txt)

        # Run load test against deployed staging API service
        uv run --with locust==2.31.1 --with websockets locust -f tests/load_test/load_test.py \
        -H "$${API_URL}" \
        --headless \
        -t 30s -u 2 -r 1 \
        --csv=tests/load_test/.results/results \
        --html=tests/load_test/.results/report.html
        LOCUST_EXIT_CODE=$$?

        # Exit with error if locust test failed
        if [ $$LOCUST_EXIT_CODE -ne 0 ]; then
          echo "Load test failed with exit code $$LOCUST_EXIT_CODE"
          exit $$LOCUST_EXIT_CODE
        fi
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Export Load Test Results to GCS
  - name: gcr.io/cloud-builders/gcloud
    id: export-results-to-gcs
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export _TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        gsutil -m cp -r tests/load_test/.results gs://${_LOGS_BUCKET_NAME_STAGING}/load-test-results/results-$${_TIMESTAMP}
        echo "_________________________________________________________________________"
        echo "Load test results copied to gs://${_LOGS_BUCKET_NAME_STAGING}/load-test-results/results-$${_TIMESTAMP}"
        echo "HTTP link: https://console.cloud.google.com/storage/browser/${_LOGS_BUCKET_NAME_STAGING}/load-test-results/results-$${_TIMESTAMP}"
        echo "_________________________________________________________________________"
  # Deploy frontend (Firebase Hosting)
  - name: "node:20"
    id: deploy-frontend-staging
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        API_BASE_URL="${_FRONTEND_API_BASE_URL}"
        if [ -z "$${API_BASE_URL}" ] && [ -f /workspace/api_url.txt ]; then
          API_BASE_URL=$$(cat /workspace/api_url.txt)
        fi
        if [ -z "$${API_BASE_URL}" ]; then
          echo "Could not determine frontend API URL"
          exit 1
        fi
        WS_BASE_URL="${_FRONTEND_WS_BASE_URL}"
        if [ -z "$${WS_BASE_URL}" ]; then
          WS_BASE_URL=$$(printf '%s' "$${API_BASE_URL}" | sed -e 's#^https://#wss://#' -e 's#^http://#ws://#')
        fi

        npm --prefix frontend ci
        VITE_API_BASE_URL="$${API_BASE_URL}" VITE_WS_BASE_URL="$${WS_BASE_URL}" npm --prefix frontend run build
        npm install -g firebase-tools
        firebase deploy --non-interactive --only hosting --project "${_STAGING_PROJECT_ID}"

  # Trigger Prod Deployment
  - name: gcr.io/cloud-builders/gcloud
    id: trigger-prod-deployment
    entrypoint: gcloud
    args:
      - "beta"
      - "builds"
      - "triggers"
      - "run"
      - "${_PROD_DEPLOY_TRIGGER_NAME}"
      - "--region"
      - "$LOCATION"
      - "--project"
      - "$PROJECT_ID"
      - "--sha"
      - $COMMIT_SHA

  - name: gcr.io/cloud-builders/gcloud
    id: echo-view-build-trigger-link
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        echo "_________________________________________________________________________"
        echo "Production deployment triggered. View progress and / or approve on the Cloud Build Console:"
        echo "https://console.cloud.google.com/cloud-build/builds;region=$LOCATION"
        echo "_________________________________________________________________________"

substitutions:
  _STAGING_PROJECT_ID: YOUR_STAGING_PROJECT_ID
  _REGION: europe-west1
  _API_SERVICE_NAME: language-coach-api
  _DEPLOY_DISPLAY_NAME: language-coach
  _PROD_DEPLOY_TRIGGER_NAME: deploy-language-coach
  _FRONTEND_API_BASE_URL: ""
  _FRONTEND_WS_BASE_URL: ""

logsBucket: gs://${PROJECT_ID}-language-coach-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
