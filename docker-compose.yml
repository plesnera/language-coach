version: "3.9"

services:
  # Firebase emulators (Auth + Firestore)
  firebase-emulators:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "npm install -g firebase-tools &&
               firebase emulators:start --only auth,firestore --project demo-test"
    ports:
      - "9099:9099"   # Auth emulator
      - "8080:8080"   # Firestore emulator
      - "4000:4000"   # Emulator UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Backend (FastAPI)
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - FIRESTORE_EMULATOR_HOST=firebase-emulators:8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulators:9099
      - GOOGLE_CLOUD_PROJECT=demo-test
      - LOCAL_DEV=true
    command: >
      python -m app.app_utils.expose_app
        --mode local --host 0.0.0.0 --port 8000
    depends_on:
      firebase-emulators:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (Vite dev server)
  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "8501:8501"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_BASE_URL=ws://localhost:8000
    command: bash -c "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
